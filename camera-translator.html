<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>カメラ翻訳</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#05070c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="カメラ翻訳">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <!-- connect-srcのVercelドメインは、api/translate.jsをデプロイ後に実際のURLへ差し替えること -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; worker-src 'self' blob: https://cdn.jsdelivr.net; connect-src https://cdn.jsdelivr.net https://api.mymemory.translated.net https://*.vercel.app; style-src 'unsafe-inline'; img-src 'self' blob: data:; manifest-src 'self'">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --accent: #818cf8;
      --accent-dim: rgba(129, 140, 248, 0.35);
      --danger: #fb7185;
      --danger-dim: rgba(251, 113, 133, 0.35);
      --highlight: #8cdcff;
      --ink: #e7e9f0;
      --ink-dim: #8b93a7;
      --bg: #05070c;
      --surface: rgba(11, 14, 22, 0.72);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      color: var(--ink);
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    #video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    #overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #hint {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      text-align: center;
      padding: 0 32px;
      z-index: 2;
    }

    #viewfinder {
      position: relative;
      width: min(58vw, 220px);
      height: min(58vw, 220px);
    }

    #viewfinder .corner {
      position: absolute;
      width: 30px;
      height: 30px;
      border: 3px solid var(--accent);
      opacity: 0.85;
    }

    #viewfinder .corner.tl { top: 0; left: 0; border-right: none; border-bottom: none; border-top-left-radius: 8px; }
    #viewfinder .corner.tr { top: 0; right: 0; border-left: none; border-bottom: none; border-top-right-radius: 8px; }
    #viewfinder .corner.bl { bottom: 0; left: 0; border-right: none; border-top: none; border-bottom-left-radius: 8px; }
    #viewfinder .corner.br { bottom: 0; right: 0; border-left: none; border-top: none; border-bottom-right-radius: 8px; }

    #viewfinder .scanline {
      position: absolute;
      left: 8%;
      right: 8%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent) 30%, var(--accent) 70%, transparent);
      box-shadow: 0 0 10px 1px var(--accent-dim);
      animation: scan 2.6s ease-in-out infinite;
    }

    @keyframes scan {
      0%, 100% { top: 14%; opacity: 0.9; }
      50% { top: 82%; opacity: 0.5; }
    }

    #hint h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--ink);
    }

    #hint p {
      font-size: 14px;
      line-height: 1.7;
      max-width: 300px;
      color: var(--ink-dim);
    }

    #topBar {
      position: absolute;
      top: max(14px, env(safe-area-inset-top));
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 3;
      pointer-events: none;
    }

    #status {
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--ink-dim);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 8px 18px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
      min-width: 120px;
      text-align: center;
    }

    #langToggle {
      appearance: none;
      pointer-events: auto;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 8px 20px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
      cursor: pointer;
    }

    #langToggle:disabled { opacity: 0.5; cursor: not-allowed; }

    #tiltWarning {
      background: rgba(251, 113, 133, 0.16);
      border: 1px solid rgba(251, 113, 133, 0.4);
      color: #fecdd3;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 7px 16px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
      text-align: center;
      display: none;
    }

    #controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: max(88px, calc(env(safe-area-inset-bottom) + 64px));
      display: flex;
      justify-content: center;
      z-index: 3;
    }

    button {
      appearance: none;
      background: linear-gradient(135deg, #818cf8, #6366f1);
      border: none;
      color: #fff;
      padding: 18px 48px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.02em;
      border-radius: 999px;
      box-shadow: 0 8px 24px -6px var(--accent-dim), 0 2px 6px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
      min-width: 200px;
      min-height: 56px;
    }

    button:active { transform: scale(0.96); }

    button:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

    button.active {
      background: linear-gradient(135deg, #fb7185, #e11d48);
      box-shadow: 0 8px 24px -6px var(--danger-dim), 0 2px 6px rgba(0,0,0,0.4);
    }

    #error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fecdd3;
      background: var(--surface);
      border: 1px solid rgba(251, 113, 133, 0.3);
      border-left: 3px solid var(--danger);
      backdrop-filter: blur(10px);
      padding: 18px 22px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
      max-width: 320px;
      z-index: 5;
      display: none;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>

    <div id="hint">
      <div id="viewfinder">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="scanline"></div>
      </div>
      <div>
        <h1 id="hintTitle">英語にかざすだけ</h1>
        <p id="hintText">カメラで英語のテキストを捉えると、その場に日本語訳を重ねて表示します。</p>
      </div>
    </div>

    <div id="topBar">
      <button id="langToggle" type="button">EN → 日本語</button>
      <div id="status">待機中</div>
      <div id="tiltWarning">スマホを水平に構えてください</div>
    </div>

    <div id="controls">
      <button id="toggleBtn">カメラを起動</button>
    </div>

    <div id="error"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js" crossorigin="anonymous"></script>
  <script>
    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const overlayCtx = overlay.getContext('2d');
    const hint = document.getElementById('hint');
    const hintTitleEl = document.getElementById('hintTitle');
    const hintTextEl = document.getElementById('hintText');
    const statusEl = document.getElementById('status');
    const tiltWarningEl = document.getElementById('tiltWarning');
    const toggleBtn = document.getElementById('toggleBtn');
    const langToggleBtn = document.getElementById('langToggle');
    const errorDiv = document.getElementById('error');

    const captureCanvas = document.createElement('canvas');
    const captureCtx = captureCanvas.getContext('2d', { willReadFrequently: true });

    const OCR_MAX_DIM = 640;      // OCR用にダウンスケールする最大辺
    const SCAN_INTERVAL_MS = 1200; // 1スキャン完了後、次スキャン開始までの待機時間
    const MIN_CONFIDENCE = 55;     // Tesseractの信頼度スコア(0-100)の足切りライン
    const MIN_LETTERS = 2;         // ノイズ除去: 最低限含むべき英字数
    const CACHE_MAX = 400;         // 翻訳キャッシュの最大保持件数
    const TILT_WARN_DEG = 18;      // この角度を超えたら傾き警告を表示
    const TILT_CLEAR_DEG = 12;     // この角度を下回ったら警告を消す(チラつき防止のヒステリシス)

    // DeepLプロキシ(Vercel Serverless Function)。失敗時はMyMemory APIにフォールバックする。
    const TRANSLATE_PROXY_URL = 'https://claude-pi-lilac.vercel.app/api/translate';

    // 言語ペア定義。scriptTestは検出したOCR行がノイズでないかの判定に使う文字種の正規表現
    const LANG_PAIRS = {
      enToJa: {
        ocrLang: 'eng',
        targetLang: 'JA',
        mmPair: 'en|ja',
        label: 'EN → 日本語',
        scriptTest: /[A-Za-z]/g,
        minChars: MIN_LETTERS,
        uiLang: 'ja',
      },
      jaToEn: {
        ocrLang: 'jpn',
        targetLang: 'EN',
        mmPair: 'ja|en',
        label: '日本語 → EN',
        scriptTest: /[぀-ヿ一-鿿]/g,
        minChars: 1,
        uiLang: 'en',
      },
    };

    // UIの説明文言。翻訳先の読み手が読める言語で表示する
    // (EN→JAは日本語話者向けなので日本語UI、JA→ENは英語話者向けなので英語UI)
    const STRINGS = {
      ja: {
        pageTitle: 'カメラ翻訳',
        hintTitle: '英語にかざすだけ',
        hintText: 'カメラで英語のテキストを捉えると、その場に日本語訳を重ねて表示します。',
        statusIdle: '待機中',
        statusPreparing: 'OCRエンジンを準備中…',
        statusSearching: 'テキストを探しています…',
        statusRecognizing: '認識中…',
        statusTranslatingCount: (n) => `${n}件を翻訳中`,
        statusError: '認識エラー',
        statusSwitching: '言語を切り替え中…',
        tiltWarning: 'スマホを水平に構えてください',
        btnStart: 'カメラを起動',
        btnStarting: '起動中…',
        btnStop: '停止',
        errNoCamera: 'このブラウザはカメラ機能に対応していません。\nSafariまたはChromeの最新版でお試しください。',
        errCameraAccess: 'カメラにアクセスできませんでした。\nブラウザの設定でカメラの使用を許可してください。\n(HTTPS接続が必要です)',
        errLangSwitch: '言語の切り替えに失敗しました。',
      },
      en: {
        pageTitle: 'Camera Translator',
        hintTitle: 'Just point at Japanese text',
        hintText: 'Point your camera at Japanese text and its English translation appears right over it.',
        statusIdle: 'Idle',
        statusPreparing: 'Preparing OCR engine…',
        statusSearching: 'Looking for text…',
        statusRecognizing: 'Recognizing…',
        statusTranslatingCount: (n) => `Translating ${n} item${n === 1 ? '' : 's'}`,
        statusError: 'Recognition error',
        statusSwitching: 'Switching language…',
        tiltWarning: 'Please hold your phone level',
        btnStart: 'Start Camera',
        btnStarting: 'Starting…',
        btnStop: 'Stop',
        errNoCamera: 'This browser does not support camera access.\nPlease try the latest Safari or Chrome.',
        errCameraAccess: 'Could not access the camera.\nPlease allow camera access in your browser settings.\n(HTTPS connection required)',
        errLangSwitch: 'Failed to switch language.',
      },
    };

    let stream = null;
    let worker = null;
    let scanning = false;
    let scanTimer = null;
    let lastBoxes = [];
    let currentPairKey = 'enToJa';
    const translationCache = new Map();

    function currentPair() {
      return LANG_PAIRS[currentPairKey];
    }

    function currentStrings() {
      return STRINGS[currentPair().uiLang];
    }

    function showError(message) {
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
    }

    function hideError() {
      errorDiv.style.display = 'none';
    }

    function resizeOverlay() {
      overlay.width = overlay.clientWidth;
      overlay.height = overlay.clientHeight;
      drawOverlay();
    }

    async function getCameraStream() {
      const preferred = {
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      };
      try {
        return await navigator.mediaDevices.getUserMedia(preferred);
      } catch (e) {
        return await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      }
    }

    // 端末の左右の傾き(gamma)を見て、傾けすぎている間だけ警告を出す。
    // スマホを立てて構えている前提でのおおまかな目安であり、正確な水準器ではない。
    function handleDeviceOrientation(event) {
      if (event.gamma === null || event.gamma === undefined) return;
      const tilt = Math.abs(event.gamma);
      if (tilt > TILT_WARN_DEG) {
        tiltWarningEl.style.display = 'block';
      } else if (tilt < TILT_CLEAR_DEG) {
        tiltWarningEl.style.display = 'none';
      }
    }

    async function enableTiltWarning() {
      if (typeof DeviceOrientationEvent === 'undefined') return;
      try {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          const result = await DeviceOrientationEvent.requestPermission();
          if (result !== 'granted') return;
        }
        window.addEventListener('deviceorientation', handleDeviceOrientation);
      } catch (err) {
        console.error(err);
      }
    }

    function disableTiltWarning() {
      window.removeEventListener('deviceorientation', handleDeviceOrientation);
      tiltWarningEl.style.display = 'none';
    }

    async function ensureWorker(ocrLang) {
      if (worker && worker.__lang === ocrLang) return worker;
      if (worker) {
        await worker.terminate();
        worker = null;
      }
      statusEl.textContent = currentStrings().statusPreparing;
      worker = await Tesseract.createWorker(ocrLang);
      worker.__lang = ocrLang;
      // SPARSE_TEXT: 看板やパッケージのようにバラバラに散らばった文字を想定したモード
      // (デフォルトのAUTOは文書レイアウト前提であまり向かない)
      await worker.setParameters({ tessedit_pageseg_mode: '11' });
      return worker;
    }

    async function startCamera() {
      hideError();
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showError(currentStrings().errNoCamera);
        return;
      }
      toggleBtn.disabled = true;
      toggleBtn.textContent = currentStrings().btnStarting;
      try {
        stream = await getCameraStream();
        video.srcObject = stream;
        await video.play();
        hint.style.display = 'none';
        resizeOverlay();

        await ensureWorker(currentPair().ocrLang);
        enableTiltWarning();

        scanning = true;
        statusEl.textContent = currentStrings().statusSearching;
        toggleBtn.textContent = currentStrings().btnStop;
        toggleBtn.classList.add('active');
        toggleBtn.disabled = false;
        scheduleScan(200);
      } catch (err) {
        console.error(err);
        toggleBtn.textContent = currentStrings().btnStart;
        toggleBtn.disabled = false;
        showError(currentStrings().errCameraAccess);
      }
    }

    function stopCamera() {
      scanning = false;
      if (scanTimer) { clearTimeout(scanTimer); scanTimer = null; }
      if (stream) {
        stream.getTracks().forEach((t) => t.stop());
        stream = null;
      }
      disableTiltWarning();
      video.srcObject = null;
      lastBoxes = [];
      overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
      toggleBtn.disabled = false;
      toggleBtn.textContent = currentStrings().btnStart;
      toggleBtn.classList.remove('active');
      statusEl.textContent = currentStrings().statusIdle;
      hint.style.display = 'flex';
    }

    function toggleCamera() {
      if (stream) {
        stopCamera();
      } else {
        startCamera();
      }
    }

    function updateLangUI() {
      const pair = currentPair();
      const strings = currentStrings();
      document.documentElement.lang = pair.uiLang;
      document.title = strings.pageTitle;
      langToggleBtn.textContent = pair.label;
      hintTitleEl.textContent = strings.hintTitle;
      hintTextEl.textContent = strings.hintText;
      tiltWarningEl.textContent = strings.tiltWarning;
      if (stream) {
        toggleBtn.textContent = strings.btnStop;
      } else {
        statusEl.textContent = strings.statusIdle;
        toggleBtn.textContent = strings.btnStart;
      }
    }

    async function toggleLangPair() {
      currentPairKey = currentPairKey === 'enToJa' ? 'jaToEn' : 'enToJa';
      updateLangUI();
      lastBoxes = [];
      overlayCtx.clearRect(0, 0, overlay.width, overlay.height);

      if (!stream) return;

      // カメラ起動中の切り替え: OCRワーカーを新しい言語のものに作り直す
      langToggleBtn.disabled = true;
      toggleBtn.disabled = true;
      scanning = false;
      if (scanTimer) { clearTimeout(scanTimer); scanTimer = null; }
      statusEl.textContent = currentStrings().statusSwitching;
      try {
        await ensureWorker(currentPair().ocrLang);
        scanning = true;
        statusEl.textContent = currentStrings().statusSearching;
        scheduleScan(200);
      } catch (err) {
        console.error(err);
        showError(currentStrings().errLangSwitch);
      } finally {
        langToggleBtn.disabled = false;
        toggleBtn.disabled = false;
      }
    }

    function scheduleScan(delay) {
      if (!scanning) return;
      scanTimer = setTimeout(runScanCycle, delay);
    }

    // グレースケール化+コントラスト伸長(上下1%の外れ値は無視)。
    // 看板の照明ムラや反射で眠くなりがちな画像のOCR精度を上げる。
    // 二値化まではせず、Tesseract内部の適応的な閾値処理に任せる。
    function preprocessForOCR(ctx, w, h) {
      const imageData = ctx.getImageData(0, 0, w, h);
      const data = imageData.data;
      const pixelCount = w * h;
      const gray = new Uint8ClampedArray(pixelCount);
      const hist = new Uint32Array(256);

      for (let i = 0, p = 0; p < pixelCount; i += 4, p++) {
        const g = (data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114) | 0;
        gray[p] = g;
        hist[g]++;
      }

      const clip = pixelCount * 0.01;
      let lo = 0;
      let acc = 0;
      while (lo < 255 && acc < clip) { acc += hist[lo]; lo++; }
      let hi = 255;
      acc = 0;
      while (hi > 0 && acc < clip) { acc += hist[hi]; hi--; }

      const range = hi - lo;
      if (range < 10) return; // ほぼ均一な画像は過剰強調を避けてそのまま

      const scale = 255 / range;
      for (let i = 0, p = 0; p < pixelCount; i += 4, p++) {
        const v = (gray[p] - lo) * scale;
        const clamped = v < 0 ? 0 : v > 255 ? 255 : v;
        data[i] = data[i + 1] = data[i + 2] = clamped;
      }

      ctx.putImageData(imageData, 0, 0);
    }

    async function runScanCycle() {
      if (!scanning) return;
      if (!video.videoWidth) {
        scheduleScan(300);
        return;
      }
      try {
        statusEl.textContent = currentStrings().statusRecognizing;

        const vw = video.videoWidth;
        const vh = video.videoHeight;
        const scale = Math.min(1, OCR_MAX_DIM / Math.max(vw, vh));
        const cw = Math.max(1, Math.round(vw * scale));
        const ch = Math.max(1, Math.round(vh * scale));
        captureCanvas.width = cw;
        captureCanvas.height = ch;
        captureCtx.drawImage(video, 0, 0, cw, ch);
        preprocessForOCR(captureCtx, cw, ch);

        const pair = currentPair();

        // rotateAuto: スマホの向き(縦/横/上下逆)を自動検出して補正してから認識する
        const { data } = await worker.recognize(captureCanvas, { rotateAuto: true });
        const lines = (data.lines || []).filter((line) => {
          const t = (line.text || '').trim();
          if (line.confidence < MIN_CONFIDENCE) return false;
          const charCount = (t.match(pair.scriptTest) || []).length;
          return charCount >= pair.minChars;
        });

        const results = await Promise.all(
          lines.map((line) => translateCached(line.text.trim().replace(/\s+/g, ' ')))
        );

        const boxes = [];
        for (let i = 0; i < lines.length; i++) {
          const translated = results[i];
          if (translated) {
            boxes.push({ bbox: lines[i].bbox, translated, ocrW: cw, ocrH: ch });
          }
        }

        if (scanning) {
          lastBoxes = boxes;
          drawOverlay();
          const strings = currentStrings();
          statusEl.textContent = boxes.length
            ? strings.statusTranslatingCount(boxes.length)
            : strings.statusSearching;
        }
      } catch (err) {
        console.error(err);
        if (scanning) statusEl.textContent = currentStrings().statusError;
      } finally {
        scheduleScan(SCAN_INTERVAL_MS);
      }
    }

    async function translateCached(text) {
      if (!text) return null;
      const pair = currentPair();
      const cacheKey = `${currentPairKey}:${text}`;
      if (translationCache.has(cacheKey)) return translationCache.get(cacheKey);

      const translated =
        (await translateViaDeepL(text, pair.targetLang)) ||
        (await translateViaMyMemory(text, pair.mmPair));
      if (translated) cacheSet(cacheKey, translated);
      return translated;
    }

    async function translateViaDeepL(text, targetLang) {
      if (!TRANSLATE_PROXY_URL) return null;
      try {
        const res = await fetch(TRANSLATE_PROXY_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, target_lang: targetLang }),
        });
        if (!res.ok) return null;
        const data = await res.json();
        if (typeof data.translatedText === 'string' && data.translatedText.trim()) {
          return data.translatedText.slice(0, 300);
        }
      } catch (err) {
        console.error(err);
      }
      return null;
    }

    async function translateViaMyMemory(text, mmPair) {
      try {
        const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${mmPair}`;
        const res = await fetch(url);
        if (!res.ok) return null;
        const data = await res.json();
        if (
          data &&
          data.responseData &&
          typeof data.responseData.translatedText === 'string'
        ) {
          const translated = data.responseData.translatedText.slice(0, 300);
          if (/MYMEMORY WARNING/i.test(translated)) return null;
          return translated;
        }
      } catch (err) {
        console.error(err);
      }
      return null;
    }

    function cacheSet(key, value) {
      if (translationCache.size >= CACHE_MAX) {
        const oldestKey = translationCache.keys().next().value;
        translationCache.delete(oldestKey);
      }
      translationCache.set(key, value);
    }

    function computeVideoRect() {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const cw = overlay.width;
      const ch = overlay.height;
      if (!vw || !vh || !cw || !ch) return { x: 0, y: 0, w: cw, h: ch };
      const scale = Math.min(cw / vw, ch / vh);
      const w = vw * scale;
      const h = vh * scale;
      return { x: (cw - w) / 2, y: (ch - h) / 2, w, h };
    }

    function drawOverlay() {
      overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
      const rect = computeVideoRect();
      if (!rect.w || !rect.h) return;

      for (const box of lastBoxes) {
        const { bbox, translated, ocrW, ocrH } = box;
        const sx = rect.w / ocrW;
        const sy = rect.h / ocrH;
        const x0 = rect.x + bbox.x0 * sx;
        const y0 = rect.y + bbox.y0 * sy;
        const x1 = rect.x + bbox.x1 * sx;
        const y1 = rect.y + bbox.y1 * sy;
        const boxW = Math.max(x1 - x0, 24);
        const boxH = Math.max(y1 - y0, 20);

        let fontSize = Math.max(12, Math.min(boxH * 0.78, 28));
        overlayCtx.textBaseline = 'middle';
        overlayCtx.lineJoin = 'round';
        overlayCtx.font = `700 ${fontSize}px "Hiragino Sans", "Noto Sans JP", sans-serif`;
        while (fontSize > 9 && overlayCtx.measureText(translated).width > boxW) {
          fontSize -= 1;
          overlayCtx.font = `700 ${fontSize}px "Hiragino Sans", "Noto Sans JP", sans-serif`;
        }

        const tx = x0;
        const ty = y0 + boxH / 2;

        // ホログラム風: シアンの光暈をまとった氷白文字。黒縁取りで視認性を確保
        overlayCtx.strokeStyle = 'rgba(0, 0, 0, 0.85)';
        overlayCtx.lineWidth = fontSize * 0.22;
        overlayCtx.strokeText(translated, tx, ty);

        overlayCtx.shadowColor = 'rgba(140, 220, 255, 0.95)';
        overlayCtx.shadowBlur = fontSize * 0.85;
        overlayCtx.fillStyle = '#eaf7ff';
        overlayCtx.fillText(translated, tx, ty);
        overlayCtx.fillText(translated, tx, ty); // 二重描画でグローをにじませる

        overlayCtx.shadowBlur = 0;
      }
    }

    toggleBtn.addEventListener('click', toggleCamera);
    langToggleBtn.addEventListener('click', toggleLangPair);
    updateLangUI();

    window.addEventListener('resize', () => {
      if (stream) resizeOverlay();
    });

    window.addEventListener('beforeunload', () => {
      stopCamera();
      if (worker) worker.terminate();
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
